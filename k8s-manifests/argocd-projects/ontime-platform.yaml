apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ontime-platform
  namespace: argocd
spec:
  description: 'Core infrastructure components for OnTime.denta (Ingress, Cert-Manager, etc.)'
  
  sourceRepos:
  - '*' 

  # ИСПРАВЛЕННАЯ СЕКЦИЯ DESTINATIONS
  destinations:
    server: https://kubernetes.default.svc
  - namespace: api-gateway 
    server: https://kubernetes.default.svc
  - namespace: kube-system # <-- 🚨 НУЖНО ДОБАВИТЬ ЭТОТ
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: '*'
    kind: '*' 

  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'

  roles: []